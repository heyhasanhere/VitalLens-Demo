name: vitallens
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
    # Core ML — CPU build for local laptop (Intel Evo, no CUDA)
    # On SageMaker: pip install torch torchvision --index-url https://download.pytorch.org/whl/cu118
    - torch==2.2.0
    - torchvision==0.17.0
    - torchaudio==2.2.0

    # ONNX — CPU runtime for local inference/demo
    # On SageMaker: pip install onnxruntime-gpu instead
    - onnx==1.16.0
    - onnxruntime==1.18.0

    # Computer Vision
    - opencv-python==4.9.0.80
    - mediapipe==0.10.14
    - Pillow==10.3.0

    # Backend
    - fastapi==0.111.0
    - uvicorn[standard]==0.30.1
    - websockets==12.0
    - python-multipart==0.0.9

    # Data / Signal Processing
    - numpy==1.26.4
    - scipy==1.13.0
    - pandas==2.2.2
    - scikit-learn==1.5.0

    # Experiment Tracking
    - wandb==0.17.0

    # Utilities
    - tqdm==4.66.4
    - matplotlib==3.9.0
    - ipykernel==6.29.4
    - jupyter==1.0.0
